[benchmark]
# Profile tested (used for naming reports, not for filtering the corpus)
profile = restructuration

# Target model — the one that rewrites the raw Whisper transcription
# with the candidate system prompt.
model = ministral-3:14b
temperature = 0.3
num_ctx_k = 32

# Ollama HTTP endpoint
endpoint = http://localhost:11434/api/generate

# Corpus selection. Glob is relative to benchmark/ and matches the JSONL
# files written by WhispUI's JsonlFileSink under data/corpus/.
corpus_glob = data/corpus/*.jsonl

# Path (relative to benchmark/) of the rewrite prompt being optimized.
# Autoresearch writes here between experiments; benchmark.py reads it.
prompt = config/prompts/system_prompt.txt

# Judge backend: "claude" (Anthropic SDK, default) or "ollama" (local
# Ministral fallback). Leave judge_model empty to use the backend default
# (Sonnet for claude, ministral-3:14b for ollama).
judge_backend = claude
judge_model =

[autoresearch]
# Designer model — generates candidate prompt variants.
designer_model = ministral-3:14b

# Loop limits
max_experiments = 10
runs_per_experiment = 3
