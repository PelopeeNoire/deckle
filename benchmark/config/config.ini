[benchmark]
# Profile tested (used for naming reports, not for filtering the corpus)
profile = restructuration

# Target model — the one that rewrites the raw Whisper transcription
# with the candidate system prompt.
model = ministral-3:14b
temperature = 0.3
num_ctx_k = 32

# Ollama HTTP endpoint
endpoint = http://localhost:11434/api/generate

# Corpus selection. Glob is relative to benchmark/ and matches the JSONL
# files written by WhispUI's JsonlFileSink under telemetry/<profile-slug>/.
corpus_glob = telemetry/*/corpus.jsonl

# Path (relative to benchmark/) of the rewrite prompt being optimized.
# Autoresearch writes here between experiments; benchmark.py reads it.
prompt = config/prompts/system_prompt.txt

# Judge backend: "claude" (Anthropic SDK, default) or "ollama" (local
# Ministral fallback). Leave judge_model empty to use the backend default
# (Sonnet for claude, ministral-3:14b for ollama).
judge_backend = claude
judge_model =

[autoresearch]
# Designer model — generates candidate prompt variants.
designer_model = ministral-3:14b

# Loop limits
max_experiments = 10
runs_per_experiment = 3

[whisper_bench]
# whisper.cpp CLI binary that re-transcribes WAVs with candidate params.
# Adjacent DLLs (ggml*.dll, libwhisper.dll) must live in the same folder.
whisper_binary = ../whisper.cpp/build/bin/whisper-cli.exe

# Whisper model used for inference. Matches the WhispUI default.
model_path = ../models/ggml-large-v3.bin

# Spoken language passed via -l. "auto" lets Whisper detect.
language = fr

# Default Whisper decoding parameters. Override via CLI flags.
default_initial_prompt =
default_temperature = 0.0
default_beam_size = 5

# Corpus selection — same glob as the rewrite benchmark; the bracket
# filter narrows down to a duration tier when needed.
corpus_glob = telemetry/*/corpus.jsonl

# This bench has no automated LLM judge. It dumps transcriptions to
# reports/last_whisper_run.{json,txt} for human / Claude Code
# review. No API key, no secret on disk.
