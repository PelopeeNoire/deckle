[benchmark]
# Profil testé (pour référence / nommage des résultats)
profile = nettoyage

# Modèle cible (celui qui reçoit le prompt à tester)
model = ministral:3b-instruct-q8
temperature = 0.15
num_ctx_k = 32

# Modèle juge (évalue la qualité de la sortie)
judge_model = ministral-3:14b

# Ollama
endpoint = http://localhost:11434/api/generate

# Fichiers
corpus = corpus.json
prompt = system_prompt.txt

[autoresearch]
# Modèle designer (génère les variantes de prompt)
designer_model = ministral-3:14b

# Limites
max_experiments = 10
runs_per_experiment = 3
